<!DOCTYPE html>
<html lang="id" data-theme="vibrant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Tracker Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-top">
                <h1 class="app-title">Activity Tracker</h1>
                <button class="theme-switch-btn" onclick="toggleTheme()" id="themeBtn">✨ Tema: Vibrant</button>
            </div>
            <div class="header-status" style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                <span class="network-status" id="netStatus">● Online</span>
                <span class="mobile-access-badge">📱 Mobile Sync: <strong id="mobileLink">Local</strong></span>
                <button style="padding:6px 12px; border-radius:8px; background:linear-gradient(135deg,#a855f7,#ec4899); color:white; border:none; font-size:11px; font-weight:800; cursor:pointer;" onclick="downloadActivityApp('windows')">💻 App Windows</button>
                <button style="padding:6px 12px; border-radius:8px; background:linear-gradient(135deg,#10b981,#059669); color:white; border:none; font-size:11px; font-weight:800; cursor:pointer;" onclick="downloadActivityApp('android')">📱 App Android</button>
                <button style="padding:6px 12px; border-radius:8px; background:#0284c7; color:white; border:none; font-size:11px; font-weight:800; cursor:pointer;" onclick="exportTasksCSV()">📊 Ekspor CSV</button>
                <span class="license-badge" id="licenseBadge" onclick="showLicenseModal()" style="cursor: pointer; background: #f59e0b; color: #fff; padding: 4px 12px; border-radius: 6px; font-weight: bold;">⚡ Aktifkan PRO</span>
            </div>
        </header>

        <div class="dashboard">
            <div class="stats-panel">
                <div class="stat-box process" onclick="switchTab('progress')">
                    <span class="label">PROSES BERJALAN</span>
                    <span class="value" id="processScore">0</span>
                </div>
                <div class="stat-box success" onclick="switchTab('success')">
                    <span class="label">TUGAS SELESAI</span>
                    <span class="value" id="successScore">0</span>
                </div>
                <div class="stat-box failed" onclick="switchTab('failed')">
                    <span class="label">GAGAL / BATAL</span>
                    <span class="value" id="failedScore">0</span>
                </div>
            </div>

            <div class="add-task-panel glass">
                <h3>📝 Tambah Waktu & Tugas Baru</h3>
                <div class="input-group">
                    <input type="text" id="taskName" placeholder="Tulis deskripsi atau aktivitas baru di sini...">
                    <input type="date" id="taskDate">
                    <input type="time" id="taskTime">
                    <button class="add-btn" onclick="addTask()">+ Simpan Tugas</button>
                </div>
            </div>

            <!-- Pomodoro Focus Audio Generator Panel -->
            <div class="add-task-panel glass" style="margin-top:15px; border-color:#a855f7;">
                <h3 style="color:#d8b4fe;"><i class="fa-solid fa-headphones"></i> Pomodoro Focus Audio Generator (100% Offline Synth)</h3>
                <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; align-items:center;">
                    <button class="add-btn" style="background:#1e293b; color:#38bdf8; border:1px solid #38bdf8;" onclick="toggleFocusAudio('rain')">🌧️ Hujan Rintik</button>
                    <button class="add-btn" style="background:#1e293b; color:#f59e0b; border:1px solid #f59e0b;" onclick="toggleFocusAudio('whitenoise')">🌊 White Noise</button>
                    <button class="add-btn" style="background:#1e293b; color:#10b981; border:1px solid #10b981;" onclick="toggleFocusAudio('binaural')">🧘 Binaural Alpha Beats</button>
                    <button class="add-btn" id="stop-audio-btn" style="background:#ef4444; color:white; display:none;" onclick="stopFocusAudio()">⏹️ Matikan Suara</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('progress')">🔥 Waktu Berjalan</button>
                <button class="tab-btn" onclick="switchTab('success')">✅ Riwayat Selesai</button>
                <button class="tab-btn" onclick="switchTab('failed')">❌ Riwayat Gagal</button>
            </div>

            <div class="task-list-container glass">
                <table class="modern-table">
                    <thead>
                        <tr>
                            <th>ID TUGAS</th>
                            <th>DESKRIPSI TUGAS</th>
                            <th>TANGGAL</th>
                            <th>BATAS WAKTU</th>
                            <th>AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="taskList">
                        <!-- Tasks injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
