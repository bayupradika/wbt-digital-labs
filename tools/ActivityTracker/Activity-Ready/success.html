<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Activities</title>
    <link rel="stylesheet" href="success_style.css">

    <link rel="icon" href="/wbt-digital-labs/assets/img/favicon.png" type="image/png">
</head>
<body>
    <style>
      .wbt-global-header {
        position: sticky;
        top: 0;
        z-index: 9999;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding: 12px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .wbt-global-header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .wbt-global-header-left img {
        height: 38px;
        width: auto;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .wbt-global-header-left img:hover {
        transform: scale(1.05);
      }
      .wbt-global-header-title {
        color: white;
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 0.5px;
      }
      .wbt-global-header-center {
        color: #94a3b8;
        font-size: 14px;
        font-weight: 500;
        flex-grow: 1;
        text-align: center;
      }
      .wbt-global-header-right {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        padding: 8px 16px;
        border-radius: 99px;
        font-size: 13px;
      }
      @media (max-width: 768px) {
        .wbt-global-header-center { display: none; }
      }
    </style>
    <header class="wbt-global-header">
      <div class="wbt-global-header-left">
        <a href="https://bayupradika.github.io/wbt-digital-labs/" title="Kembali ke Portal WBT">
            <img src="/wbt-digital-labs/assets/img/wbt-logo.png" alt="WBT Logo">
        </a>
        <div class="wbt-global-header-title">Activity Tracker Pro</div>
      </div>
      <div class="wbt-global-header-center">
        Aplikasi Manajemen Produktivitas
      </div>
      <div class="wbt-global-header-right">
        <span style="color:#10b981; font-weight:700;">PRO: Rp 20.000</span>
      </div>
    </header>

    <div class="header">
        <h1>Success Activities</h1>
        <a style="color: white; font-weight: 400; text-decoration: none;" href="index.html">HOME</a>
    </div>
    
    <div class="container">
        <div class="task-list">
            <h3>KEGIATAN</h3>
            <table>
                <thead>
                    <tr>
                        <th>JUDUL KEGIATAN</th>
                        <th>DATE&DAY</th>
                        <th>TIME</th>
                    </tr>
                </thead>
                <tbody id="task-list"></tbody>
            </table>
        </div>

        <div class="leaderboard">
            <h3>LEADERBOARD</h3>
            <table>
                <thead>
                    <tr>
                        <th style="background-color: #4CAF50"><a style="text-decoration: none; list-style: none; color: black;" href="success.html">SUCCESS</a></th>
                        <th style="background-color: #f44336;"><a style="text-decoration: none; list-style: none; color: black;" href="failed.html">FAILED</a></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><a style="font-size: 50px; font-weight: 700; text-decoration: none; list-style: none; color: black;" href="success.html" id="success-score">0</a></td>
                        <td><a style="font-size: 50px; font-weight: 700; text-decoration: none; list-style: none; color: black;" href="failed.html" id="failed-score">0</a></td>
                    </tr>
                </tbody>
            </table>
            <button id="reset-button" onclick="resetLeaderboard()">Reset</button>
            <p id="description"></p>
        </div>
    </div>

    <script src="success_script.js"></script>
</body>
</html>
