<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Models Viewer - WBT Digital Labs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="icon" href="/wbt-digital-labs/assets/img/favicon.png" type="image/png">
</head>
<body>
    <style>
      .wbt-global-header {
        position: sticky;
        top: 0;
        z-index: 9999;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding: 12px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .wbt-global-header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .wbt-global-header-left img {
        height: 38px;
        width: auto;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .wbt-global-header-left img:hover {
        transform: scale(1.05);
      }
      .wbt-global-header-title {
        color: white;
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 0.5px;
      }
      .wbt-global-header-center {
        color: #94a3b8;
        font-size: 14px;
        font-weight: 500;
        flex-grow: 1;
        text-align: center;
      }
      .wbt-global-header-right {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        padding: 8px 16px;
        border-radius: 99px;
        font-size: 13px;
      }
      @media (max-width: 768px) {
        .wbt-global-header-center { display: none; }
      }
    </style>
    <header class="wbt-global-header">
      <div class="wbt-global-header-left">
        <a href="https://bayupradika.github.io/wbt-digital-labs/" title="Kembali ke Portal WBT">
            <img src="/wbt-digital-labs/assets/img/wbt-logo.png" alt="WBT Logo">
        </a>
        <div class="wbt-global-header-title">3D Models Viewer Pro</div>
      </div>
      <div class="wbt-global-header-center">
        Lihat File .FBX, .OBJ, .GLB dengan Auto-Rotate
      </div>
      <div class="wbt-global-header-right">
      </div>
    </header>

    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fa-solid fa-cube text-primary"></i>
                <h2>3D Viewer</h2>
            </div>
            
            <div class="control-group">
                <h3><i class="fa-solid fa-upload"></i> Unggah Model</h3>
                <p class="help-text">Mendukung: .fbx, .obj, .glb, .gltf</p>
                <div class="drop-zone" id="dropZone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>Seret & Lepas file ke sini<br>atau klik untuk memilih</p>
                    <input type="file" id="fileInput" accept=".fbx,.obj,.glb,.gltf" hidden>
                </div>
            </div>

            <div class="control-group">
                <h3><i class="fa-solid fa-sliders"></i> Tampilan</h3>
                <div class="toggle-control">
                    <label>Auto-Rotate</label>
                    <label class="switch">
                        <input type="checkbox" id="autoRotateToggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-control">
                    <label>Wireframe</label>
                    <label class="switch">
                        <input type="checkbox" id="wireframeToggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="toggle-control">
                    <label>Grid Helper</label>
                    <label class="switch">
                        <input type="checkbox" id="gridToggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <div class="control-group">
                <h3><i class="fa-solid fa-lightbulb"></i> Pencahayaan</h3>
                <input type="range" id="lightIntensity" min="0" max="5" step="0.1" value="2">
            </div>

            <button class="btn btn-secondary" id="resetCamBtn">
                <i class="fa-solid fa-camera-rotate"></i> Reset Kamera
            </button>
            
            <a href="../../index.html" class="btn btn-outline">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Portal
            </a>
        </aside>

        <!-- Main Viewing Area -->
        <main class="viewer-area">
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p id="loadingText">Memuat Model...</p>
            </div>
            <div id="canvasContainer"></div>
            <div class="instructions">
                <i class="fa-solid fa-mouse"></i> Kiri: Putar | Kanan: Geser | Scroll: Zoom
            </div>
        </main>
    </div>

    <!-- Load Three.js and Dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <!-- fflate needed for FBX decompression -->
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.1/umd/index.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
