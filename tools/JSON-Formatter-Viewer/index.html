<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter & Converter Studio Pro - Offline Data Tool</title>
  <link rel="stylesheet" href="style.css?v=3.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="navbar">
    <div class="container nav-content">
      <a href="#" class="logo"><div class="logo-icon"><i class="fa-solid fa-code"></i></div>JSON <span style="color:#58a6ff">Studio Pro</span></a>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <div class="quota-pill" id="quota-display" onclick="MidtransPay.showUpgradeModal()">Memuat Kuota...</div>
        <button style="padding:8px 12px; border-radius:10px; background:linear-gradient(135deg,#a855f7,#ec4899); color:white; border:none; font-size:12px; font-weight:800; cursor:pointer;" onclick="downloadJSONApp('windows')"><i class="fa-brands fa-windows"></i> App Windows</button>
        <button style="padding:8px 12px; border-radius:10px; background:linear-gradient(135deg,#10b981,#059669); color:white; border:none; font-size:12px; font-weight:800; cursor:pointer;" onclick="downloadJSONApp('android')"><i class="fa-brands fa-android"></i> App Android</button>
        <button class="btn btn-gold" onclick="MidtransPay.showUpgradeModal()"><i class="fa-solid fa-crown"></i> Pro Rp8rb</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0; flex-wrap:wrap; gap:10px;">
      <h2>Perapih, Validator & <span style="color:#58a6ff">Konverter JSON Offline</span></h2>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="formatJson(2)"><i class="fa-solid fa-wand-magic-sparkles"></i> Rapikan (2 Spasi)</button>
        <button class="btn" style="background:#1f6feb; color:white;" onclick="formatJson(4)"><i class="fa-solid fa-indent"></i> 4 Spasi</button>
        <button class="btn" style="background:#21262d; color:white;" onclick="minifyJson()"><i class="fa-solid fa-compress"></i> Minify</button>
        <button class="btn" style="background:#238636; color:white;" onclick="convertJsonToCsv()"><i class="fa-solid fa-table"></i> ke CSV</button>
        <button class="btn" style="background:#8957e5; color:white;" onclick="convertJsonToYaml()"><i class="fa-solid fa-file-code"></i> ke YAML</button>
        <button class="btn" style="background:#0284c7; color:white; font-size:11px;" onclick="generateTSInterface()"><i class="fa-brands fa-js"></i> ke TypeScript</button>
        <button class="btn" style="background:#059669; color:white; font-size:11px;" onclick="generateGoStruct()"><i class="fa-brands fa-golang"></i> ke Go Struct</button>
        <button class="btn" style="background:#d97706; color:white; font-size:11px;" onclick="generatePythonClass()"><i class="fa-brands fa-python"></i> ke Python Class</button>
      </div>
    </div>

    <div class="grid-2">
      <div>
        <div style="display:flex; justify-content:space-between; margin-bottom:6px;"><h3>Input JSON Mentah</h3><button style="background:none; border:none; color:#58a6ff; cursor:pointer; font-size:12px;" onclick="loadSampleJson()">💡 Contoh JSON</button></div>
        <textarea id="input-json" placeholder='Tempel teks JSON mentah di sini, contoh: [{"nama":"Budi","umur":25,"role":"Developer"}]'></textarea>
      </div>
      <div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
          <h3>Hasil Output (<span id="output-mode">Format JSON</span>)</h3>
          <span id="status" style="color:#3fb950; font-size:13px; font-weight:700;">Siap</span>
        </div>
        <textarea id="output-json" readonly style="background:#0d1117;"></textarea>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="btn" style="flex:1; background:#21262d;" onclick="copyOutput()"><i class="fa-regular fa-copy"></i> Salin Hasil</button>
          <button class="btn" style="flex:1; background:#1f6feb;" onclick="downloadOutputFile()"><i class="fa-solid fa-download"></i> Simpan File</button>
        </div>
      </div>
    </div>
  </main>
  <script src="../midtrans-pay.js?v=3.0"></script>
  <script src="app.js?v=3.0"></script>
</body>
</html>
