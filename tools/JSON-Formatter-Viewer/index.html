<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter & Viewer - Rapikan Data JSON</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="navbar"><div class="container nav-content">
    <a href="#" class="logo"><div class="logo-icon"><i class="fa-solid fa-brackets-curly"></i></div>JSON <span style="color:#58a6ff">Formatter</span></a>
    <div style="display:flex; gap:12px; align-items:center;">
      <div class="quota-pill" id="quota-display">Sisa Kuota: 3 / 3</div>
      <button class="btn btn-gold" onclick="openModal()"><i class="fa-solid fa-crown"></i> Pro Rp8.000</button>
    </div>
  </div></header>
  <main class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0;">
      <h2>Perapih & Validasi <span style="color:#58a6ff">JSON Offline</span></h2>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-primary" onclick="formatJson()"><i class="fa-solid fa-wand-magic-sparkles"></i> Rapikan (Format)</button>
        <button class="btn" style="background:#21262d; color:white;" onclick="minifyJson()"><i class="fa-solid fa-compress"></i> Minify</button>
      </div>
    </div>
    <div class="grid-2">
      <div><h3>Input JSON Mentah</h3><textarea id="input-json" placeholder='Tempel teks JSON mentah di sini, contoh: {"nama":"Budi","umur":25}'></textarea></div>
      <div>
        <div style="display:flex; justify-content:space-between; align-items:center;"><h3>Hasil Valid & Rapih</h3><span id="status" style="color:#3fb950; font-size:13px;">Siap</span></div>
        <textarea id="output-json" readonly style="background:#0d1117;"></textarea>
      </div>
    </div>
  </main>
  <div class="modal" id="pro-modal"><div class="modal-content">
    <button onclick="closeModal()" style="position:absolute; top:15px; right:15px; background:none; border:none; color:white; font-size:20px; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
    <i class="fa-solid fa-crown" style="font-size:40px; color:#fbbf24; margin-bottom:15px;"></i>
    <h2>Upgrade Pro Lifetime</h2>
    <p style="color:var(--text-muted); margin:10px 0;">Harga Spesial Indonesia: <b>Rp 8.000</b> (Hemat 20% dari pasar Rp10.000). Tanpa batas validasi!</p>
    <button onclick="payWithMidtrans()" style="background:#002855; color:white; font-weight:700; padding:14px 20px; border-radius:12px; border:none; cursor:pointer; width:100%; margin:15px 0; font-size:15px; box-shadow:0 4px 15px rgba(0,40,85,0.4); transition:all 0.2s;"><i class="fa-solid fa-credit-card" style="color:#60a5fa; margin-right:8px;"></i> Bayar Otomatis via Midtrans</button>
    <p style="font-size:12px; color:var(--text-muted);">Masukkan kode aktivasi (Ketik: <b>PRO8K</b>):</p>
    <div style="display:flex; gap:8px; margin-top:10px;"><input id="act-code" placeholder="KODE" style="flex:1; padding:8px; border-radius:6px; background:#21262d; border:1px solid var(--border-color); color:white;"><button class="btn btn-gold" onclick="activatePro()">Aktifkan</button></div>
  </div></div>
  <script src="app.js"></script>
<script src="../midtrans-pay.js"></script>`r`n</body></html>
