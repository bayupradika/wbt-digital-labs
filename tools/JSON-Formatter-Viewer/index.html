<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JSON Formatter &amp; Converter Studio Pro - Offline Data Tool</title>
<link href="style.css?v=3.0" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="/wbt-digital-labs/assets/img/favicon.png" rel="icon" type="image/png"/>
</head>
<body>
<style>
      .wbt-global-header {
        position: sticky;
        top: 0;
        z-index: 9999;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding: 12px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .wbt-global-header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .wbt-global-header-left img {
        height: 38px;
        width: auto;
        cursor: pointer;
        transition: transform 0.2s;
      }
      .wbt-global-header-left img:hover {
        transform: scale(1.05);
      }
      .wbt-global-header-title {
        color: white;
        font-weight: 800;
        font-size: 18px;
        letter-spacing: 0.5px;
      }
      .wbt-global-header-center {
        color: #94a3b8;
        font-size: 14px;
        font-weight: 500;
        flex-grow: 1;
        text-align: center;
      }
      .wbt-global-header-right {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        padding: 8px 16px;
        border-radius: 99px;
        font-size: 13px;
      }
      @media (max-width: 768px) {
        .wbt-global-header-center { display: none; }
      }
    </style>
<header class="wbt-global-header">
<div class="wbt-global-header-left">
<a href="https://bayupradika.github.io/wbt-digital-labs/" title="Kembali ke Portal WBT">
<img alt="WBT Logo" src="/wbt-digital-labs/assets/img/wbt-logo.png"/>
</a>
<div class="wbt-global-header-title">JSON Formatter &amp; Viewer</div>
</div>
<div class="wbt-global-header-center">
        Rapikan, Validasi, &amp; Minify Struktur Kode JSON
      </div>
<div class="wbt-global-header-right" style="display: flex; gap: 8px; align-items: center; justify-content: flex-end;"><div class="container nav-content">
<a class="logo" href="#"><div class="logo-icon"><i class="fa-solid fa-code"></i></div>JSON <span style="color:#58a6ff">Studio Pro</span></a>
<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
<div class="quota-pill" id="quota-display" onclick="MidtransPay.showUpgradeModal()">Memuat Kuota...</div>
<button onclick="downloadJSONApp('windows')" style="padding:8px 12px; border-radius:10px; background:linear-gradient(135deg,#a855f7,#ec4899); color:white; border:none; font-size:12px; font-weight:800; cursor:pointer;"><i class="fa-brands fa-windows"></i> App Windows</button>
<button onclick="downloadJSONApp('android')" style="padding:8px 12px; border-radius:10px; background:linear-gradient(135deg,#10b981,#059669); color:white; border:none; font-size:12px; font-weight:800; cursor:pointer;"><i class="fa-brands fa-android"></i> App Android</button>
<button class="btn btn-gold" onclick="MidtransPay.showUpgradeModal()"><i class="fa-solid fa-crown"></i> Pro Rp8rb</button>
</div>
</div></div>
</header>

<main class="container">
<div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0; flex-wrap:wrap; gap:10px;">
<h2>Perapih, Validator &amp; <span style="color:#58a6ff">Konverter JSON Offline</span></h2>
<div style="display:flex; gap:8px; flex-wrap:wrap;">
<button class="btn btn-primary" onclick="formatJson(2)"><i class="fa-solid fa-wand-magic-sparkles"></i> Rapikan (2 Spasi)</button>
<button class="btn" onclick="formatJson(4)" style="background:#1f6feb; color:white;"><i class="fa-solid fa-indent"></i> 4 Spasi</button>
<button class="btn" onclick="minifyJson()" style="background:#21262d; color:white;"><i class="fa-solid fa-compress"></i> Minify</button>
<button class="btn" onclick="convertJsonToCsv()" style="background:#238636; color:white;"><i class="fa-solid fa-table"></i> ke CSV</button>
<button class="btn" onclick="convertJsonToYaml()" style="background:#8957e5; color:white;"><i class="fa-solid fa-file-code"></i> ke YAML</button>
<button class="btn" onclick="generateTSInterface()" style="background:#0284c7; color:white; font-size:11px;"><i class="fa-brands fa-js"></i> ke TypeScript</button>
<button class="btn" onclick="generateGoStruct()" style="background:#059669; color:white; font-size:11px;"><i class="fa-brands fa-golang"></i> ke Go Struct</button>
<button class="btn" onclick="generatePythonClass()" style="background:#d97706; color:white; font-size:11px;"><i class="fa-brands fa-python"></i> ke Python Class</button>
</div>
</div>
<div class="grid-2">
<div>
<div style="display:flex; justify-content:space-between; margin-bottom:6px;"><h3>Input JSON Mentah</h3><button onclick="loadSampleJson()" style="background:none; border:none; color:#58a6ff; cursor:pointer; font-size:12px;">💡 Contoh JSON</button></div>
<textarea id="input-json" placeholder='Tempel teks JSON mentah di sini, contoh: [{"nama":"Budi","umur":25,"role":"Developer"}]'></textarea>
</div>
<div>
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
<h3>Hasil Output (<span id="output-mode">Format JSON</span>)</h3>
<span id="status" style="color:#3fb950; font-size:13px; font-weight:700;">Siap</span>
</div>
<textarea id="output-json" readonly="" style="background:#0d1117;"></textarea>
<div style="display:flex; gap:8px; margin-top:8px;">
<button class="btn" onclick="copyOutput()" style="flex:1; background:#21262d;"><i class="fa-regular fa-copy"></i> Salin Hasil</button>
<button class="btn" onclick="downloadOutputFile()" style="flex:1; background:#1f6feb;"><i class="fa-solid fa-download"></i> Simpan File</button>
</div>
</div>
</div>
</main>
<script src="../midtrans-pay.js?v=3.0"></script>
<script src="app.js?v=3.0"></script>
</body>
</html>
