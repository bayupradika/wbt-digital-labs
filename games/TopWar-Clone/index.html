<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top War Canvas Clone</title>
    <!-- Use a generic sans-serif for UI, and heavy font for levels -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- CANVAS RENDERER -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD LAYER (Absolute Positioned over map) -->
    <div id="hudLayer">
        
        <!-- Profile UI (Redesigned) -->
        <div class="profile-ui" style="display: flex; gap: 10px; background: none; box-shadow: none; padding: 0;">
            <!-- Avatar & VIP -->
            <div class="avatar-box" style="position: relative; margin-right: 5px;">
                <img src="https://ui-avatars.com/api/?name=WB&background=0ea5e9&color=fff&size=60" alt="Avatar" style="border-radius: 8px; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.5);">
                <div class="vip-badge" style="position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); background: #f59e0b; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; border: 1px solid white;">VIP 0</div>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <!-- Row 1: Gold and Gems -->
            <div style="display: flex; gap: 10px;">
                <div class="resource-badge" style="background: rgba(0,0,0,0.5); border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; gap: 8px; color: white; font-weight: bold; border: 2px solid #555; cursor: pointer;">
                    <div style="width: 24px; height: 24px; background: gold; border-radius: 50%; border: 2px solid #b8860b; display: flex; justify-content: center; align-items: center; color: #b8860b; font-size: 14px; box-shadow: inset 0 0 5px rgba(255,255,255,0.8);">T</div>
                    <span id="goldText">50K</span>
                    <i class="fa-solid fa-plus" style="color: white; margin-left: 10px; font-size: 12px; font-weight: 900;"></i>
                </div>
                <div class="resource-badge" style="background: rgba(0,0,0,0.5); border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; gap: 8px; color: white; font-weight: bold; border: 2px solid #555; cursor: pointer;">
                    <i class="fa-solid fa-gem" style="color: #ef4444; font-size: 18px; filter: drop-shadow(0 0 2px rgba(255,0,0,0.5));"></i>
                    <span id="gemText">100K</span>
                    <i class="fa-solid fa-plus" style="color: white; margin-left: 10px; font-size: 12px; font-weight: 900;"></i>
                </div>
            </div>
            
            <!-- Row 2: Level and EXP -->
            <div style="display: flex; align-items: center; position: relative;">
                <div style="width: 44px; height: 44px; background: #84cc16; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; z-index: 2; font-size: 14px; position: relative; margin-right: -15px; filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.8));">
                    <i class="fa-solid fa-star" style="font-size: 16px; margin-top: 2px;"></i>
                </div>
                <div style="background: rgba(0,0,0,0.5); border: 3px solid #555; border-radius: 0 15px 15px 0; height: 28px; display: flex; align-items: center; width: 180px; position: relative; overflow: hidden; cursor: pointer;" id="expContainer">
                    <div id="expBar" style="background: #a3e635; height: 100%; width: 70.7%; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.2);"></div>
                    <div style="position: absolute; width: 100%; text-align: center; color: white; font-weight: 900; font-size: 14px; text-shadow: 1px 1px 2px black; font-family: 'Roboto Condensed', sans-serif; letter-spacing: 1px;">Lv.<span id="levelText">5</span></div>
                </div>
                
                <!-- EXP Tooltip (hidden by default) -->
                <div id="expTooltip" style="display: none; position: absolute; top: 40px; left: 30px; background: rgba(0,0,0,0.9); border: 1px solid #555; color: white; padding: 10px; border-radius: 8px; font-size: 13px; z-index: 10; white-space: nowrap; font-family: 'Nunito', sans-serif;">
                    <div style="margin-bottom: 3px;">EXP <span id="expCurrentText">4.65k</span>/<span id="expMaxText">6.57k</span></div>
                    <div style="color: #fbbf24;">Level <span id="nextLevelText">6</span> Requires <span id="expReqText">1.92k</span></div>
                </div>
            </div>

            <!-- Row 3: Combat Power -->
            <div style="display: flex; align-items: center; margin-top: 2px;">
                <div style="width: 32px; height: 32px; background: #3b82f6; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; color: white; z-index: 2; position: relative; margin-right: -10px; margin-left: 5px;">
                    <i class="fa-solid fa-star" style="color: #fbbf24; font-size: 14px;"></i>
                </div>
                <div style="background: rgba(0,0,0,0.5); border: 3px solid #555; border-radius: 0 15px 15px 0; height: 24px; display: flex; align-items: center; width: 120px; padding-left: 15px;">
                    <span id="powerText" style="color: white; font-weight: bold; font-family: 'Roboto Condensed', sans-serif; letter-spacing: 1px;">3,235</span>
                </div>
            </div>
            </div>
        </div>

        <!-- RIGHT MENU (Vertical Icons) -->
        <div class="hud-right-menu">
            <div class="menu-icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-gift"></i><span class="badge-dot"></span></div>
            <div class="menu-icon"><i class="fa-solid fa-shield"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-clipboard-list"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-envelope"></i><span class="badge-num">97</span></div>
            <div class="menu-icon"><i class="fa-solid fa-briefcase"></i></div>
        </div>

        <!-- BOTTOM CONTROLS -->
        <div class="hud-bottom">
            <div class="side-menu left" style="top: 50%; transform: translateY(-50%); position: absolute; left: 10px; display: flex; flex-direction: column; gap: 15px; z-index: 100;">
                <button class="circle-btn" id="trainUnitsLeftBtn" title="Latih Maks 10 Unit" style="background: #3b82f6; color: white; width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); cursor: pointer;">
                    <i class="fa-solid fa-person-rifle"></i>
                </button>
            </div>
            
            <div class="action-circle build-btn" id="buildBtn">
                <i class="fa-solid fa-hammer"></i>
                <span>Bangun</span>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel">
                <div class="chat-line"><span class="chat-name">Yountry:</span> hallo</div>
                <div class="chat-line"><span class="chat-name">Jonas:</span> hi</div>
                <div class="chat-line"><span class="chat-name">ALADIWANE:</span> @[OPTS]...</div>
            </div>

            <!-- World Button -->
            <div class="action-circle world-btn">
                <i class="fa-solid fa-map-location-dot"></i>
                <span>Dunia</span>
            </div>
        </div>

    </div>

    <!-- BUILD MENU MODAL (Bottom Sheet) -->
    <div id="buildMenu" class="build-menu-sheet">
        <div class="build-menu-header">
            <h3>Bangun Struktur (2x2)</h3>
            <button id="closeBuildBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="build-items">
            <div class="build-item" id="buyBarrackBtn">
                <div class="item-icon barrack-icon"><i class="fa-solid fa-tents"></i></div>
                <h4>Barrack</h4>
                <p style="font-size:10px; color:#94a3b8; margin-bottom:5px;">(Spawn Army)</p>
                <button class="buy-btn"><i class="fa-solid fa-coins"></i> 300</button>
            </div>
            <div class="build-item" id="buyMineBtn">
                <div class="item-icon mine-icon"><i class="fa-solid fa-building"></i></div>
                <h4>Gold Mine</h4>
                <p style="font-size:10px; color:#94a3b8; margin-bottom:5px;">(Generate Gold)</p>
                <button class="buy-btn"><i class="fa-solid fa-coins"></i> 500</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu" style="display:none; position:absolute; z-index: 500; transform: translate(-50%, -100%); padding-bottom:10px;">
        <button id="contextActionBtn" class="action-btn" style="background:#3b82f6; border:2px solid white; border-radius:12px; padding:10px; color:white; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.5);">
            <i class="fa-solid fa-plus"></i> Latih (100 Gold)
        </button>
    </div>

    <!-- Placement Confirmation UI -->
    <div id="placementUI" style="display:none; position:absolute; z-index: 400; transform: translate(-50%, 20px); gap:20px;">
        <button id="cancelPlaceBtn" style="background:#ef4444; border:3px solid white; border-radius:50%; width:40px; height:40px; color:white; font-size:20px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.5);"><i class="fa-solid fa-xmark"></i></button>
        <button id="confirmPlaceBtn" style="background:#22c55e; border:3px solid white; border-radius:50%; width:40px; height:40px; color:white; font-size:20px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.5);"><i class="fa-solid fa-check"></i></button>
    </div>

    <script src="game.js"></script>
</body>
</html>
