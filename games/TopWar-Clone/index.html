<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top War Canvas Clone</title>
    <!-- Use a generic sans-serif for UI, and heavy font for levels -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- CANVAS RENDERER -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD LAYER (Absolute Positioned over map) -->
    <div id="hudLayer">
        
        <!-- TOP LEFT: PLAYER INFO -->
        <div class="hud-top-left">
            <div class="player-avatar">
                <img src="https://ui-avatars.com/api/?name=WBT&background=0D8ABC&color=fff&size=50" alt="Avatar">
                <div class="vip-badge">VIP 3</div>
            </div>
            <div class="player-stats">
                <div class="power-bar">
                    <i class="fa-solid fa-fist-raised"></i> 19.9ee
                    <div class="gem-bar"><i class="fa-solid fa-gem" style="color: #ef4444;"></i> 21316 <i class="fa-solid fa-plus add-btn"></i></div>
                </div>
                <div class="level-bar">
                    <div class="level-badge">Lv.84</div>
                    <div class="gold-bar"><i class="fa-solid fa-coins" style="color: #fbbf24;"></i> <span id="goldText">15,055,764</span> <i class="fa-solid fa-plus add-btn"></i></div>
                    <div class="r-bar"><i class="fa-solid fa-r" style="color: #a855f7;"></i> 4750 <i class="fa-solid fa-plus add-btn"></i></div>
                </div>
            </div>
        </div>

        <!-- RIGHT MENU (Vertical Icons) -->
        <div class="hud-right-menu">
            <div class="menu-icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-gift"></i><span class="badge-dot"></span></div>
            <div class="menu-icon"><i class="fa-solid fa-shield"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-clipboard-list"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-envelope"></i><span class="badge-num">97</span></div>
            <div class="menu-icon"><i class="fa-solid fa-briefcase"></i></div>
        </div>

        <!-- BOTTOM CONTROLS -->
        <div class="hud-bottom">
            <!-- Build Button -->
            <div class="action-circle build-btn" id="buildBtn">
                <i class="fa-solid fa-hammer"></i>
                <span>Bangun</span>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel">
                <div class="chat-line"><span class="chat-name">Yountry:</span> hallo</div>
                <div class="chat-line"><span class="chat-name">Jonas:</span> hi</div>
                <div class="chat-line"><span class="chat-name">ALADIWANE:</span> @[OPTS]...</div>
            </div>

            <!-- World Button -->
            <div class="action-circle world-btn">
                <i class="fa-solid fa-map-location-dot"></i>
                <span>Dunia</span>
            </div>
        </div>

    </div>

    <!-- BUILD MENU MODAL (Bottom Sheet) -->
    <div id="buildMenu" class="build-menu-sheet">
        <div class="build-menu-header">
            <h3>Bangun Struktur (2x2)</h3>
            <button id="closeBuildBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="build-items">
            <div class="build-item" id="buyBarrackBtn">
                <div class="item-icon barrack-icon"><i class="fa-solid fa-tents"></i></div>
                <h4>Barrack</h4>
                <p style="font-size:10px; color:#94a3b8; margin-bottom:5px;">(Spawn Army)</p>
                <button class="buy-btn"><i class="fa-solid fa-coins"></i> 300</button>
            </div>
            <div class="build-item" id="buyMineBtn">
                <div class="item-icon mine-icon"><i class="fa-solid fa-building"></i></div>
                <h4>Gold Mine</h4>
                <p style="font-size:10px; color:#94a3b8; margin-bottom:5px;">(Generate Gold)</p>
                <button class="buy-btn"><i class="fa-solid fa-coins"></i> 500</button>
            </div>
        </div>
    </div>

    <!-- Context Menu for clicking Barrack -->
    <div id="barrackMenu" class="context-menu" style="display:none; position:absolute; z-index: 500; transform: translate(-50%, -100%); padding-bottom:10px;">
        <button id="spawnArmyBtn" class="action-btn" style="background:#3b82f6; border:2px solid white; border-radius:12px; padding:10px; color:white; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.5);">
            <i class="fa-solid fa-plus"></i> Recruit (100 Gold)
        </button>
    </div>

    <!-- Placement Confirmation UI -->
    <div id="placementUI" style="display:none; position:absolute; z-index: 400; transform: translate(-50%, 20px); gap:20px;">
        <button id="cancelPlaceBtn" style="background:#ef4444; border:3px solid white; border-radius:50%; width:40px; height:40px; color:white; font-size:20px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.5);"><i class="fa-solid fa-xmark"></i></button>
        <button id="confirmPlaceBtn" style="background:#22c55e; border:3px solid white; border-radius:50%; width:40px; height:40px; color:white; font-size:20px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.5);"><i class="fa-solid fa-check"></i></button>
    </div>

    <script src="game.js"></script>
</body>
</html>
