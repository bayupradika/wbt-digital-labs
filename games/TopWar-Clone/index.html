<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WBT Army Merge: Battle Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top HUD -->
    <header class="hud-top">
        <div class="hud-item gold-display">
            <i class="fa-solid fa-coins" style="color: #fbbf24;"></i>
            <span id="goldText">0</span>
            <div class="income-rate" id="incomeRateText">+0/s</div>
        </div>
        <div class="hud-item level-display">
            <i class="fa-solid fa-star" style="color: #38bdf8;"></i>
            <span>Lv. <span id="playerLevelText">1</span></span>
        </div>
    </header>

    <!-- Main Game Area -->
    <main id="gameContainer">
        <!-- BASE SCREEN -->
        <section id="baseScreen" class="screen active">
            <div class="grid-container" id="baseGrid">
                <!-- Cells generated by JS -->
            </div>
            
            <div class="decorations-layer" id="decorationsLayer">
                <!-- Decorations spawned here -->
            </div>
        </section>

        <!-- BATTLE SCREEN (Hidden initially) -->
        <section id="battleScreen" class="screen">
            <div class="battle-header">
                <h2>STAGE <span id="stageText">1</span></h2>
            </div>
            <div class="battle-arena">
                <div class="team-area player-team" id="playerBattleGrid"></div>
                <div class="vs-badge">VS</div>
                <div class="team-area enemy-team" id="enemyBattleGrid"></div>
            </div>
            <div class="battle-logs" id="battleLogs"></div>
        </section>
    </main>

    <!-- Bottom Controls -->
    <nav class="bottom-bar">
        <button class="action-btn recruit-btn" id="recruitBtn">
            <i class="fa-solid fa-person-military-rifle"></i>
            <div>Recruit</div>
            <div class="cost" id="recruitCostText"><i class="fa-solid fa-coins"></i> 100</div>
        </button>
        <button class="action-btn mine-btn" id="mineBtn">
            <i class="fa-solid fa-building-wheat"></i>
            <div>Gold Mine</div>
            <div class="cost" id="mineCostText"><i class="fa-solid fa-coins"></i> 150</div>
        </button>
        <button class="action-btn decor-btn" id="decorShopBtn">
            <i class="fa-solid fa-tree"></i>
            <div>Decor</div>
        </button>
        <button class="action-btn battle-btn" id="startBattleBtn">
            <i class="fa-solid fa-khanda"></i>
            <div>BATTLE</div>
        </button>
    </nav>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
        <!-- Decor Shop Modal -->
        <div class="modal" id="decorModal">
            <div class="modal-header">
                <h3>Build Decorations</h3>
                <button class="close-btn" id="closeDecorBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="decorShopList">
                <!-- Items generated by JS -->
            </div>
        </div>
        
        <!-- Battle Result Modal -->
        <div class="modal" id="battleResultModal">
            <h2 id="battleResultTitle">VICTORY!</h2>
            <div class="reward-box">
                <span>Reward:</span>
                <span style="color:#fbbf24; font-weight:800; font-size:24px;">+<span id="battleRewardText">0</span> <i class="fa-solid fa-coins"></i></span>
            </div>
            <button class="action-btn battle-btn" id="returnBaseBtn" style="width:100%; margin-top:20px;">Return to Base</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
