<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top War Web Clone</title>
    <!-- Use a generic sans-serif for UI, and heavy font for levels -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- ISOMETRIC MAP WRAPPER -->
    <div id="mapContainer">
        <div id="mapPanArea">
            <div id="isometricWorld">
                <div id="gridBoard">
                    <!-- Grid cells generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- HUD LAYER (Absolute Positioned over map) -->
    <div id="hudLayer">
        
        <!-- TOP LEFT: PLAYER INFO -->
        <div class="hud-top-left">
            <div class="player-avatar">
                <img src="https://ui-avatars.com/api/?name=WBT&background=0D8ABC&color=fff&size=50" alt="Avatar">
                <div class="vip-badge">VIP 3</div>
            </div>
            <div class="player-stats">
                <div class="power-bar">
                    <i class="fa-solid fa-fist-raised"></i> 19.9ee
                    <div class="gem-bar"><i class="fa-solid fa-gem" style="color: #ef4444;"></i> 21316 <i class="fa-solid fa-plus add-btn"></i></div>
                </div>
                <div class="level-bar">
                    <div class="level-badge">Lv.84</div>
                    <div class="gold-bar"><i class="fa-solid fa-coins" style="color: #fbbf24;"></i> <span id="goldText">15,055,764</span> <i class="fa-solid fa-plus add-btn"></i></div>
                    <div class="r-bar"><i class="fa-solid fa-r" style="color: #a855f7;"></i> 4750 <i class="fa-solid fa-plus add-btn"></i></div>
                </div>
            </div>
        </div>

        <!-- RIGHT MENU (Vertical Icons) -->
        <div class="hud-right-menu">
            <div class="menu-icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-gift"></i><span class="badge-dot"></span></div>
            <div class="menu-icon"><i class="fa-solid fa-shield"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-clipboard-list"></i></div>
            <div class="menu-icon"><i class="fa-solid fa-envelope"></i><span class="badge-num">97</span></div>
            <div class="menu-icon"><i class="fa-solid fa-briefcase"></i></div>
        </div>

        <!-- BOTTOM CONTROLS -->
        <div class="hud-bottom">
            <!-- Build Button -->
            <div class="action-circle build-btn" id="buildBtn">
                <i class="fa-solid fa-hammer"></i>
                <span>Bangun</span>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel">
                <div class="chat-line"><span class="chat-name">Yountry:</span> hallo</div>
                <div class="chat-line"><span class="chat-name">Jonas:</span> hi</div>
                <div class="chat-line"><span class="chat-name">ALADIWANE:</span> @[OPTS]...</div>
            </div>

            <!-- World Button -->
            <div class="action-circle world-btn">
                <i class="fa-solid fa-map-location-dot"></i>
                <span>Dunia</span>
            </div>
        </div>

    </div>

    <!-- BUILD MENU MODAL (Bottom Sheet) -->
    <div id="buildMenu" class="build-menu-sheet">
        <div class="build-menu-header">
            <h3>Bangun / Beli Unit</h3>
            <button id="closeBuildBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="build-items">
            <div class="build-item" id="buyArmyBtn">
                <div class="item-icon army-icon">1</div>
                <h4>Army Lv.1</h4>
                <button class="buy-btn"><i class="fa-solid fa-coins"></i> 100</button>
            </div>
            <div class="build-item" id="buyMineBtn">
                <div class="item-icon mine-icon"><i class="fa-solid fa-building"></i></div>
                <h4>Gold Mine</h4>
                <button class="buy-btn"><i class="fa-solid fa-coins"></i> 500</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
